<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>>Latihan 2.6 DPW</title>
    <link
      rel="icon"
      type="image/jpeg"
      href="Gambar\icon dadu.jpg"
      sizes="16x16"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="css/latihan.css" />
  </head>
  <body>
    <div id="header">
      <h1>Image Map (Peta Gambar)</h1>
    </div>

    <div id="main">
      <div id="link">
        <ul>
          <li><a href="#">London</a></li>
          <li><a href="#">Paris</a></li>
          <li><a href="#">Tokyo</a></li>
        </ul>
      </div>

      <div id="content">
        <map name="petagambar">
          <area
            shape="rect"
            coords="34,44,270,350"
            alt="Computer"
            href="https://en.wikipedia.org/wiki/Computer"
            title="Computer"
          />
          <area
            shape="rect"
            coords="290,172,333,250"
            alt="Phone"
            href="https://en.wikipedia.org/wiki/Telephone"
            title="Phone"
          />
          <area
            shape="circle"
            coords="337,300,44"
            alt="Coffee"
            href="https://en.wikipedia.org/wiki/Coffee"
            title="Coffee"
          />
        </map>

        <h3>
          Ilustrasi koordinat area yang diklik pada gambar (klik area bergambar)
        </h3>

        <svg class="svg-ilustrasi" width="420" height="310">
          <defs>
            <clipPath id="clipComputer">
              <rect x="34" y="44" width="236" height="256" />
            </clipPath>
            <clipPath id="clipPhone">
              <rect x="290" y="172" width="43" height="78" />
            </clipPath>
            <clipPath id="clipCoffe">
              <circle cx="337" cy="280" r="40" />
            </clipPath>
          </defs>

          <image
            href="Gambar/computer.jpg"
            x="34"
            y="44"
            width="236"
            height="256"
            preserveAspectRatio="xMidYMid slice"
            clip-path="url(#clipComputer)"
          />
          <a href="https://en.wikipedia.org/wiki/Computer" target="_blank">
            <rect
              class="area-computer"
              x="34"
              y="44"
              width="236"
              height="256"
              fill="none"
            />
          </a>

          <image
            href="gambar/Phone.jpeg"
            x="290"
            y="172"
            width="43"
            height="78"
            preserveAspectRatio="xMidYMid slice"
            clip-path="url(#clipPhone)"
          />
          <a href="https://en.wikipedia.org/wiki/Telephone" target="_blank">
            <rect
              class="area-phone"
              x="290"
              y="172"
              width="43"
              height="78"
              fill="none"
            />
            <text
              class="svg-area-label svg-area-label--sm"
              x="311"
              y="218"
              text-anchor="middle"
            >
              Phone
            </text>
          </a>

          <image
            href="gambar/Coffe.jpg"
            x="297"
            y="240"
            width="80"
            height="80"
            preserveAspectRatio="xMidYMid slice"
            clip-path="url(#clipCoffee)"
          />
          <a href="https://en.wikipedia.org/wiki/Coffee" target="_blank">
            <circle class="area-coffee" cx="337" cy="280" r="40" fill="none" />
          </a>
        </svg>

        <p>
          <em>Klik area Computer, Phone, atau Coffee untuk mengikuti link.</em>
        </p>
      </div>
    </div>

    <div id="footer">
      <i>copyright@FadhielFauziFiroos_253307020_2026</i>
    </div>
  </body>
</html>
