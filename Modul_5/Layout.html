<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="author" content="Fadhiel Fauzi Firoos" />
    <meta name="nim" content="253307020" />
    <title>Layout</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        font-family: Arial, Helvetica, sans-serif;
        margin: 0;
      }
      header {
        background-color: #666;
        padding: 30px;
        text-align: center;
        font-size: 35px;
        color: white;
      }
      nav {
        float: left;
        width: 18%;
        min-height: 500px;
        background: #ccc;
        padding: 15px;
      }
      nav ul {
        list-style-type: none;
        padding: 0;
        margin: 0;
      }
      nav ul li {
        margin-bottom: 5px;
      }
      nav ul li a {
        text-decoration: none;
        color: #333;
        font-size: 13px;
      }
      nav ul li a:hover {
        color: #000;
        text-decoration: underline;
      }
      nav ul li a.active {
        font-weight: bold;
        color: #000;
      }
      .content-area {
        float: left;
        padding: 20px;
        width: 82%;
        background-color: #f1f1f1;
        min-height: 500px;
      }
      section::after {
        content: "";
        display: table;
        clear: both;
      }
      footer {
        background-color: #777;
        padding: 10px;
        text-align: center;
        color: white;
        clear: both;
      }
      @media (max-width: 600px) {
        nav,
        .content-area {
          width: 100%;
          float: none;
        }
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
      }

      body {
        background-color: #f0f0f0;
        padding: 20px;
      }

      /* kotainer grid */
      .grid-layout {
        display: grid;
        grid-template-areas:
          "header  header  header"
          "menu    main    right"
          "footer  footer  footer";
        grid-template-columns: 1fr 3fr 1fr;
        grid-template-rows: auto 1fr auto;
        gap: 10px;
        padding: 10px;
        background-color: #b0bec5;
        border: 1px solid #90a4ae;
        max-width: 900px;
        margin: 0 auto;
      }

      /* area sett */
      .grid-layout > div {
        padding: 20px;
        text-align: center;
        font-size: 18px;
        color: #333;
      }

      .area-header {
        grid-area: header;
        background: lightblue;
        padding: 20px;
      }

      .area-menu {
        grid-area: menu;
        background: lightgreen;
        padding: 20px;
      }

      .area-main {
        grid-area: main;
        background: lightyellow;
        padding: 20px;
      }

      .area-right {
        grid-area: right;
        background: lightcoral;
        padding: 20px;
      }

      .area-footer {
        grid-area: footer;
        background: lightgray;
        padding: 20px;
      }
    </style>
  </head>
  <body>
    <header>
      <h3>Praktikum Desain & Pemrograman Web</h3>
    </header>

    <section>
      <nav>
        <ul>
          <li><a href="box_model.html">Box Model</a></li>
          <li><a href="flexbox.html">Flexbox</a></li>
          <li><a href="galeri.html">Galeri</a></li>
          <li><a href="grid_layout.html">Grid Layout</a></li>
          <li><a href="inline_grid.html">Inline Grid</a></li>
          <li><a href="grid_layout2.html">Grid Layout 2</a></li>
          <li><a href="Layout.html">Layout </a></li>
        </ul>
      </nav>
      <div class="content-area">
        <h2
          style="
            margin-top: 0;
            color: #444;
            border-bottom: 2px solid #aaa;
            padding-bottom: 8px;
          "
        >
          Test Layout
        </h3>

        <div class="grid-layout">
          <div class="area-header">Header</div>
          <div class="area-menu">Menu</div>
          <div class="area-main">Main</div>
          <div class="area-right">Right</div>
          <div class="area-footer">Footer</div>
        </div>
      </div>
    </section>

    <footer>
      <p>Fadhiel Fauzi Firoos | 253307020 &copy; 2026</p>
    </footer>
  </body>
</html>
