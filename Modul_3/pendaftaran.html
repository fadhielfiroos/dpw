<!doctype html>
<html lang="en">
  <head>
    <title>Pendaftaran</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="author" content="Fadhiel Fauzi Firoos" />
    <meta name="nim" content="253307020" />
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        font-family: Arial, Helvetica, sans-serif;
      }
      header {
        background-color: #666;
        padding: 30px;
        text-align: center;
        font-size: 35px;
        color: white;
      }
      nav {
        float: left;
        width: 30%;
        background: #ccc;
        padding: 20px;
        min-height: 600px;
      }
      nav ul {
        list-style-type: none;
        padding: 0;
      }
      nav ul li a {
        text-decoration: none;
        color: #333;
      }
      nav ul li a:hover {
        color: #000;
        text-decoration: underline;
      }
      article {
        float: left;
        padding: 20px;
        width: 70%;
        background-color: #f1f1f1;
        min-height: 600px;
      }
      section::after {
        content: "";
        display: table;
        clear: both;
      }
      footer {
        background-color: #777;
        padding: 10px;
        text-align: center;
        color: white;
      }
      @media (max-width: 600px) {
        nav,
        article {
          width: 100%;
          height: auto;
        }
      }

      fieldset {
        margin-bottom: 16px;
        border: 1px solid #aaa;
        padding: 16px;
      }
      legend {
        font-weight: bold;
      }
      table {
        border-collapse: collapse;
      }
      table td {
        padding: 6px 10px;
        vertical-align: middle;
      }
      table td:first-child {
        white-space: nowrap;
      }
      input[type="text"],
      input[type="email"],
      input[type="tel"],
      input[type="date"],
      input[type="time"],
      input[type="range"],
      input[type="number"] {
        padding: 4px 6px;
        width: 220px;
      }
      input[type="range"] {
        width: 180px;
        vertical-align: middle;
      }
      #rangeVal {
        margin-left: 8px;
        font-weight: bold;
      }
      input[type="submit"] {
        padding: 6px 20px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <header>
      <h2>Judul Website</h2>
    </header>

    <section>
      <nav>
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="gambar.html">Gambar</a></li>
          <li><a href="event.html">Event</a></li>
          <li><a href="audio.html">Audio</a></li>
          <li><a href="video.html">Video</a></li>
          <li><a href="svg.html">SVG</a></li>
          <li><a href="canvas.html">Canvas</a></li>
          <li><a href="pendaftaran.html">pendaftaran</a></li>
        </ul>
      </nav>

      <article>
        <h1>Form Penjadwal Pertemuan</h1>

        <form action="#" method="post">
          <fieldset>
            <legend>Informasi Pribadi</legend>
            <table>
              <tr>
                <td><label for="nama">Nama</label></td>
                <td>
                  <input
                    type="text"
                    id="nama"
                    name="nama"
                    placeholder="Nama lengkap"
                    required
                  />
                </td>
              </tr>
              <tr>
                <td><label for="telepon">No. Telepon</label></td>
                <td>
                  <input
                    type="tel"
                    id="telepon"
                    name="telepon"
                    placeholder="0812-345678"
                    pattern="[0-9]{4}-[0-9]{6,8}"
                    title="Format: XXXX-XXXXXX (contoh: 0812-345678)"
                    required
                  />
                </td>
              </tr>
              <tr>
                <td><label for="email">Alamat Email</label></td>
                <td>
                  <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="nama@domain.com"
                    required
                  />
                </td>
              </tr>
              <tr>
                <td><label for="tgl_lahir">Tanggal Lahir</label></td>
                <td>
                  <input
                    type="date"
                    id="tgl_lahir"
                    name="tgl_lahir"
                    min="1987-01-01"
                    max="1993-01-01"
                    required
                  />
                </td>
              </tr>
            </table>
          </fieldset>

          <fieldset>
            <legend>Permintaan Pertemuan</legend>
            <table>
              <tr>
                <td><label for="tujuan">Tujuan Pertemuan</label></td>
                <td>
                  <input
                    type="text"
                    id="tujuan"
                    name="tujuan"
                    placeholder="Tujuan pertemuan"
                    required
                  />
                </td>
              </tr>
              <tr>
                <td>
                  <label for="kepentingan">Tingkat Kepentingan Pertemuan</label>
                </td>
                <td>
                  <input
                    type="range"
                    id="kepentingan"
                    name="kepentingan"
                    min="0"
                    max="10"
                    value="5"
                    oninput="
                      document.getElementById('rangeVal').innerText = this.value
                    "
                  />
                  <span id="rangeVal">5</span>
                </td>
              </tr>
              <tr>
                <td><label for="tanggal">Tanggal</label></td>
                <td>
                  <input type="date" id="tanggal" name="tanggal" required />
                </td>
              </tr>
              <tr>
                <td><label for="waktu">Waktu</label></td>
                <td>
                  <input
                    type="time"
                    id="waktu"
                    name="waktu"
                    min="17:00"
                    max="21:00"
                    required
                  />
                </td>
              </tr>
            </table>
          </fieldset>

          <input type="submit" value="Submit" />
        </form>
      </article>
    </section>

    <footer>
      <p>Fadhiel Fauzi Firoos | 253307020 &copy; 2026</p>
    </footer>

    <script>
      var today = new Date().toISOString().split("T")[0];
      document.getElementById("tanggal").setAttribute("min", today);
    </script>
  </body>
</html>
